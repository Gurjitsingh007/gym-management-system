{% extends 'base.html' %}
{% block title %}Add Payment{% endblock %}
{% block page_title %}Record Payment{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-credit-card"></i><h2>Record New Payment</h2></div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Member *</label>
          <select name="member_id" required>
            <option value="">Select Member</option>
            {% for m in members %}<option value="{{ m.id }}">{{ m.name }} — {{ m.plan.plan_name if m.plan else 'No Plan' }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Amount (₹) *</label><input type="number" name="amount" required min="0" step="0.01" placeholder="e.g. 2499"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Payment Date</label><input type="date" name="payment_date" value="{{ today }}"></div>
        <div class="form-group">
          <label>Payment Mode</label>
          <select name="payment_mode">
            <option>Cash</option><option>Card</option><option>UPI</option><option>Net Banking</option><option>Cheque</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="Paid">Paid</option><option value="Pending">Pending</option><option value="Failed">Failed</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label><textarea name="notes" rows="2" placeholder="Optional notes..."></textarea></div>
      <div class="form-actions">
        <a href="{{ url_for('admin.payments') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Record Payment</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
