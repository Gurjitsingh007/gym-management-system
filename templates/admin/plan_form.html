{% extends 'base.html' %}
{% block title %}{{ 'Edit' if plan else 'Add' }} Plan{% endblock %}
{% block page_title %}{{ 'Edit' if plan else 'Add' }} Plan{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-tag"></i><h2>{{ 'Edit Plan' if plan else 'Create New Plan' }}</h2></div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group"><label>Plan Name *</label><input type="text" name="plan_name" required value="{{ plan.plan_name if plan else '' }}" placeholder="e.g. Premium"></div>
        <div class="form-group"><label>Duration (months) *</label><input type="number" name="duration" required min="1" value="{{ plan.duration if plan else '' }}"></div>
        <div class="form-group"><label>Fees (₹) *</label><input type="number" name="fees" required min="0" step="0.01" value="{{ plan.fees if plan else '' }}"></div>
      </div>
      <div class="form-group"><label>Benefits (comma-separated)</label>
        <textarea name="benefits" rows="3" placeholder="Access to gym floor, Locker room, Group classes">{{ plan.benefits if plan else '' }}</textarea></div>
      <div class="form-actions">
        <a href="{{ url_for('admin.plans') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {{ 'Update' if plan else 'Create Plan' }}</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
