{% extends 'base.html' %}
{% block title %}Mark Attendance{% endblock %}
{% block page_title %}Mark Attendance{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header"><i class="fas fa-calendar-check"></i><h2>Mark Attendance</h2></div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Member *</label>
          <select name="member_id" required>
            <option value="">Select Member</option>
            {% for m in members %}<option value="{{ m.id }}">{{ m.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Date</label><input type="date" name="date" value="{{ today }}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Check In Time</label><input type="time" name="check_in"></div>
        <div class="form-group"><label>Check Out Time</label><input type="time" name="check_out"></div>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('admin.attendance') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Attendance</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
